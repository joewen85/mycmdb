- hosts: "{{ domain }}"
  remote_user: root
  tasks:
    - name: "restrict api"
      lineinfile:
        dest: "/usr/local/openresty/nginx/conf/vhost/{{ domain }}.conf"
        regexp: '  location\s~\s\[\^/\]\\.php\(\/\|\$\)\s{'
        line: '  location ~ [^/](api|shop)\.php(/|$) {'
    - name: "reload nginx"
      service: name=nginx state=restarted
