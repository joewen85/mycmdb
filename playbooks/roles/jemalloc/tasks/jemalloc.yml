- name: install deploy package
  yum:
    name: "{{ packages }}"
    state: present
  vars:
    packages:
     - unzip
     - bzip2
- name: unarchive jemalloc
  unarchive:
#    src: jemalloc-{{ jemalloc_ver }}.tgz
    src: "https://downloads.yunzmall.com/playbook_source/jemalloc/jemalloc-{{ jemalloc_ver }}.tgz"
    dest: /usr/local/
    remote_src: yes
- name: link libray
  file:
    src: /usr/local/jemalloc/lib/libjemalloc.so.2
    dest: /usr/lib64/libjemalloc.so.1
    state: link
- name: jude artisan file exist or not
  stat: /usr/local/lib/jemalloc
  register: lib_result
- name: link all libray so
  shell: ln -s /usr/local/jemalloc/lib /usr/local/lib/jemalloc
  when: lib_result.stat.exists == False
